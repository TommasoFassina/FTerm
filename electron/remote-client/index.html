<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>FTerm Remote</title>
  <link rel="stylesheet" href="https://unpkg.com/@xterm/xterm@5.5.0/css/xterm.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ── PIN screen ─────────────────────────────────────────────────────────── */
    #pin-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; gap: 24px; padding: 32px;
    }
    #pin-screen h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
    #pin-screen p { font-size: 13px; color: #8b949e; text-align: center; max-width: 260px; }
    #pin-input {
      width: 160px; padding: 12px 16px; border-radius: 8px;
      border: 1px solid #30363d; background: #161b22; color: #c9d1d9;
      font-size: 24px; font-family: monospace; letter-spacing: 0.3em;
      text-align: center; outline: none;
    }
    #pin-input:focus { border-color: #58a6ff; }
    #pin-btn {
      padding: 10px 28px; border-radius: 8px; border: none;
      background: #238636; color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    #pin-btn:hover { background: #2ea043; }
    #pin-error { color: #f85149; font-size: 13px; min-height: 18px; }

    /* ── Terminal screen ────────────────────────────────────────────────────── */
    #terminal-screen { display: none; flex-direction: column; height: 100%; }
    #topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; background: #161b22; border-bottom: 1px solid #30363d;
      font-size: 12px; color: #8b949e; flex-shrink: 0;
    }
    #topbar .dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; margin-right: 6px; display: inline-block; }
    #terminal-wrap { flex: 1; overflow: hidden; padding: 4px; }
    .xterm { height: 100%; }
    .xterm-viewport { scrollbar-width: thin; scrollbar-color: #30363d transparent; }
  </style>
</head>
<body>

<!-- PIN Screen -->
<div id="pin-screen">
  <h1>FTerm Remote</h1>
  <p>Enter the 4-digit PIN shown in the FTerm app on your computer</p>
  <input id="pin-input" type="number" placeholder="0000" maxlength="4" inputmode="numeric" autocomplete="off" />
  <div id="pin-error"></div>
  <button id="pin-btn">Connect</button>
</div>

<!-- Terminal Screen -->
<div id="terminal-screen">
  <div id="topbar">
    <span><span class="dot"></span>Connected</span>
    <span id="disconnect-btn" style="cursor:pointer;color:#f85149">Disconnect</span>
  </div>
  <div id="terminal-wrap"></div>
</div>

<script src="https://unpkg.com/@xterm/xterm@5.5.0/lib/xterm.js"></script>
<script src="https://unpkg.com/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
<script>
(function () {
  const pinScreen = document.getElementById('pin-screen')
  const termScreen = document.getElementById('terminal-screen')
  const pinInput = document.getElementById('pin-input')
  const pinBtn = document.getElementById('pin-btn')
  const pinError = document.getElementById('pin-error')
  const termWrap = document.getElementById('terminal-wrap')
  const disconnectBtn = document.getElementById('disconnect-btn')

  let ws = null
  let term = null
  let fitAddon = null

  // ── Auth ────────────────────────────────────────────────────────────────────
  async function connect() {
    const pin = pinInput.value.trim()
    if (!pin || pin.length < 4) { pinError.textContent = 'Enter a 4-digit PIN'; return }
    pinError.textContent = ''
    pinBtn.disabled = true
    pinBtn.textContent = 'Connecting…'

    try {
      const res = await fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin }),
      })
      const data = await res.json()
      if (!res.ok) { throw new Error(data.error || 'Auth failed') }
      openTerminal(data.token)
    } catch (err) {
      pinError.textContent = err.message
      pinBtn.disabled = false
      pinBtn.textContent = 'Connect'
    }
  }

  // ── Terminal ────────────────────────────────────────────────────────────────
  function openTerminal(token) {
    pinScreen.style.display = 'none'
    termScreen.style.display = 'flex'

    term = new Terminal({
      theme: { background: '#0d1117', foreground: '#c9d1d9', cursor: '#58a6ff', selectionBackground: '#388bfd33' },
      fontFamily: "'Fira Code', 'Cascadia Code', monospace",
      fontSize: 13,
      allowTransparency: false,
      scrollback: 3000,
    })
    fitAddon = new FitAddon.FitAddon()
    term.loadAddon(fitAddon)
    term.open(termWrap)
    fitAddon.fit()

    const wsUrl = `ws://${location.host}/api/terminal?token=${encodeURIComponent(token)}`
    ws = new WebSocket(wsUrl)

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data)
        if (msg.type === 'data') term.write(msg.data)
      } catch { /* ignore */ }
    }

    ws.onclose = () => showDisconnected()
    ws.onerror = () => showDisconnected()

    term.onData(data => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'data', data }))
      }
    })

    // Resize observer → send resize to server
    const ro = new ResizeObserver(() => {
      fitAddon.fit()
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }))
      }
    })
    ro.observe(termWrap)

    disconnectBtn.onclick = () => { ws && ws.close(); showDisconnected() }
  }

  function showDisconnected() {
    if (term) { term.dispose(); term = null }
    termScreen.style.display = 'none'
    pinScreen.style.display = 'flex'
    pinInput.value = ''
    pinBtn.disabled = false
    pinBtn.textContent = 'Connect'
    pinError.textContent = 'Disconnected. Enter PIN to reconnect.'
  }

  // ── Events ──────────────────────────────────────────────────────────────────
  pinBtn.addEventListener('click', connect)
  pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') connect() })
})()
</script>
</body>
</html>
